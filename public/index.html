<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#04372A" />
<title>Bread · Field Cost &amp; Operations</title>

<!-- Leaflet (OpenStreetMap) for the Map view -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<link rel="stylesheet" href="/styles.css" />
<!-- Bread — new design system, re-skins the app on top of styles.css -->
<link rel="stylesheet" href="/redesign.css" />
</head>
<body>

<!-- Login / user picker -->
<div id="loginScreen" class="screen-fullscreen" role="region" aria-label="Sign in">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="loafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%"  stop-color="#F4C06A"/>
              <stop offset="100%" stop-color="#B4530A"/>
            </linearGradient>
          </defs>
          <!-- Loaf of bread -->
          <path d="M8 41 C8 27 19 20 32 20 C45 20 56 27 56 41 C56 46 52 49 47 49 L17 49 C12 49 8 46 8 41 Z" fill="url(#loafGrad)"/>
          <path d="M14 31 C20 25 44 25 50 31" fill="none" stroke="#FFE3B0" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
          <path d="M24 30 L20 39 M33 29 L29 38 M42 30 L38 39" stroke="#8A3D06" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">Bread</div>
        <div class="brand-sub">Field Cost &amp; Operations</div>
      </div>
    </div>
    <p class="login-hint">Pick a technician to sign in:</p>
    <div id="userList" class="user-list"></div>
    <p class="login-foot">Stand-in for Okta SSO · v0.66.0</p>
  </div>
</div>

<!-- App shell -->
<div id="app" class="app bg-pattern hidden">

  <!-- Header -->
  <header class="app-header">
    <button id="backBtn" class="hdr-btn hidden" data-act="back" aria-label="Back">‹</button>
    <div class="hdr-title" id="hdrTitle">Today</div>
    <div style="display:flex; gap:6px;">
      <button class="hdr-btn hidden" id="hdrPwdBtn"      data-act="change-password" title="Change password" aria-label="Change password">🔒</button>
      <button class="hdr-btn hidden" id="hdrSettingsBtn" data-act="settings" title="Settings" aria-label="Settings">⚙</button>
      <button class="hdr-btn" data-act="logout" title="Sign out" aria-label="Sign out">⎋</button>
    </div>
  </header>

  <!-- Global "acting on behalf of" indicator (manager proxy mode) -->
  <div id="proxyBar" class="proxybar hidden" role="status" aria-live="polite"></div>

  <!-- Tab views -->
  <main id="view" class="view"></main>

  <!-- Bottom tab bar (varies by role; populated by app.js after sign-in) -->
  <nav class="tabbar" id="tabbar"></nav>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

<script src="/app.js"></script>
</body>
</html>
