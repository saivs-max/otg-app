name: Fly Deploy

# Deploy on every push to main, EXCEPT when only docs/spreadsheets change
# (no point redeploying — and each deploy briefly restarts the machine).
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.docx"
      - "**.pptx"
      - "**.xlsx"
      - "**.csv"

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # Never let two deploys run at once (they share one volume-backed machine).
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
